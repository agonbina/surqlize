name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run lint checks
        run: bun run qc

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run TypeScript type check
        run: bun run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun run test:unit

  integration-tests:
    name: Integration Tests (SurrealDB ${{ matrix.surrealdb_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `v3.1.0` is not a published release (latest stable is the 3.0.x line;
        # 3.1.x is nightly-only and `setup-surreal` can only install release
        # tags or `latest`), so the matrix spans the earliest 3.x stable, the
        # newest 3.x stable, and `latest`.
        surrealdb_version: [v3.0.0, v3.0.5, latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Start SurrealDB
        uses: surrealdb/setup-surreal@7c103070ba4f544240cd287432ba70d6f50163a5 # v2.0.1
        with:
          # NB: the workflow previously pinned `v3.0.0-beta.4`, on which graph
          # traversal materialised via `.select()` (a subquery over a
          # `$parent`-rooted graph path) returns empty — a beta bug fixed before
          # the 3.0.0 stable release. The matrix above runs only stable versions.
          surrealdb_version: ${{ matrix.surrealdb_version }}
          surrealdb_port: 8000
          surrealdb_username: root
          surrealdb_password: root
          surrealdb_log: info

      - name: Run integration tests
        run: bun run test:integration
        env:
          SURREAL_URL: ws://localhost:8000

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build package
        run: bun run build

      - name: Pack and install in isolated directory
        run: |
          npm pack
          mkdir -p /tmp/smoke-test
          cp surqlize-*.tgz /tmp/smoke-test/
          cd /tmp/smoke-test
          npm init -y
          npm install surqlize-*.tgz surrealdb typescript

      - name: Copy smoke test scripts
        run: cp tests/smoke/* /tmp/smoke-test/

      - name: Smoke test - TypeScript declarations
        working-directory: /tmp/smoke-test
        run: npx tsc --noEmit --skipLibCheck --module nodenext --moduleResolution nodenext type-check.mts

      - name: Smoke test - Node.js ESM
        run: node /tmp/smoke-test/node-esm.mjs

      - name: Smoke test - Node.js CJS
        run: node /tmp/smoke-test/node-cjs.cjs

      - name: Smoke test - Bun
        run: bun /tmp/smoke-test/bun-esm.ts

      - name: Smoke test - Deno
        working-directory: /tmp/smoke-test
        run: deno run --allow-read --allow-env --allow-net --node-modules-dir=manual deno-esm.ts
